<!DOCTYPE html>
<html>
<head>

    <style>
        body { 
            font-family: Arial; max-width: 600px; margin: auto; 
        }
        input { 
            width: 80%; padding: 8px; 
        }
        button { 
            padding: 8px; 
        }
        p { 
            background: #f4f4f4; padding: 8px; border-radius: 5px; 
        }
    </style>
    <title>AI User Chat</title>
</head>
<body>
    <h1>Chat with Your Data</h1>

    <div>
        {% for message in chat %}
            <p>
                <strong>{{ message.role }}:</strong>
                {{ message.content }}
            </p>
        {% endfor %}
    </div>

    <form method="POST">
        <input type="text" name="question" placeholder="Ask something..." required>
        <button type="submit">Send</button>
    </form>
</body>
</html>
